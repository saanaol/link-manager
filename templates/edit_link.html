{% extends "layout.html" %}

{% block content %}

<h2>Edit link</h2>

<form action="/edit_link/{{ link.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <p>
    <label for="title">Title</label>:<br>
    <input
      id="title"
      type="text"
      name="title"
      value="{{ link.title }}"
      minlength="3"
      maxlength="100"
      required
    >
  </p>

  <p>
    <label for="url">URL</label>:<br>
    <input
      id="url"
      type="text"
      name="url"
      value="{{ link.url }}"
      placeholder="https://example.com"
      maxlength="300"
      required
    >
  </p>

  <p>
    <label for="notes">Notes</label>:<br>
    <textarea
      id="notes"
      name="notes"
      rows="5"
      cols="50"
      maxlength="1000"
    >{{ link.notes or "" }}</textarea>
  </p>

  {% if categories %}
    <fieldset>
      <legend>Categories</legend>

      {% for category in categories %}
        <p>
          <input
            id="category-{{ category.id }}"
            type="checkbox"
            name="categories"
            value="{{ category.id }}"
            {% if category.id|string in selected_category_ids %}checked{% endif %}
          >
          <label for="category-{{ category.id }}">{{ category.name }}</label>
        </p>
      {% endfor %}
    </fieldset>
  {% endif %}

  <p>
    <input type="submit" value="Save changes">
  </p>
</form>

<p class="back-link">
  <a href="/link/{{ link.id }}">Back to link</a>
</p>

{% endblock %}

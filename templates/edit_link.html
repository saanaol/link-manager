<!DOCTYPE html>
<html>

<head>
  <title>Edit link</title>
</head>

<body>
  <h1>Edit link</h1>
  <form action="/edit_link/{{ link.id }}" method="post">
    <p>
      Title: <input type="text" name="title" value="{{ link.title }}" required>
    </p>
    <p>
      URL: <input type="text" name="url" value="{{ link.url }}" required>
    </p>
    <input type="submit" value="Save">
  </form>
</body>

</html>

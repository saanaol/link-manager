{% extends "layout.html" %}

{% block content %}

<h2>Sign in</h2>

<form action="/login" method="post">
    <p>
        Username:
        <input type="text" name="username" required>
    </p>

    <p>
        Password:
        <input type="password" name="password" required>
    </p>

    <input type="submit" value="Sign in">
</form>

<p>
    New user?
    <a href="/register">Register</a>
</p>

{% endblock %}

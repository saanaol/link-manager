{% extends "layout.html" %}

{% block content %}

<h2>Delete link</h2>

<p>
  Are you sure you want to delete this link?
</p>

<p>
  {{ link.title }}:
  &lt;<a href="{{ link.url }}">{{ link.url }}</a>&gt;
</p>

<form action="/remove_link/{{ link.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <p>
    <input type="submit" name="continue" value="Delete">
    <input type="submit" name="cancel" value="Cancel">
  </p>
</form>

<p>
  <a href="/link/{{ link.id }}">Back to link</a>
</p>

{% endblock %}
